name: smart_health_home_kit
description: Smart Health Kit app with BLE, Hive, Charts, PDF, and Modular code.

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^8.1.0
  fl_chart: ^0.69.2
  screenshot: ^3.0.0
  flutter_blue_plus: ^1.33.4
  pdf: ^3.10.6
  printing: ^5.12.0
  path_provider: ^2.1.5
  intl: 0.20.2  # أو آخر نسخة متاحة
  open_file: ^3.3.2
  permission_handler: ^11.4.0

  flutter_localizations:
    sdk: flutter
  url_launcher: ^6.2.5  # أو آخر إصدار ثابت


dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^4.0.0



flutter:
  uses-material-design: true
  generate: true
  assets:
   - assets/images/welcome_bg.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"




