#file: noinspection YAMLSchemaValidation
name: smart_health_home_kit
description: Smart Health Kit app with BLE, Hive, Charts, PDF, and Modular code.

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.4
  fl_chart: ^1.0.0
  screenshot: ^3.0.0
  flutter_blue_plus: ^1.33.4
  pdf: ^3.10.6
  printing: ^5.12.0
  path_provider: ^2.1.5
  intl: 0.20.2  # أو آخر نسخة متاحة
  open_file: ^3.3.2
  permission_handler: ^12.0.1
  share_plus: ^10.0.0
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2
  device_info_plus: ^10.1.0
  battery_optimization_helper: ^0.1.3
  google_generative_ai: ^0.4.0
  image_picker: ^1.1.2
  http: ^1.1.0
  flutter_markdown: ^0.7.3+1
  speech_to_text: ^7.0.0
  uuid: ^4.5.1
  flutter_localizations:
    sdk: flutter
  url_launcher: ^6.2.5  # أو آخر إصدار ثابت
  firebase_core: ^3.1.1
  firebase_crashlytics: ^4.0.3


dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  hive_generator: ^2.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.7



flutter:
  uses-material-design: true
  generate: true
  assets:
   - assets/images/app_logo.png
   - assets/images/splash_logo.png
   - assets/images/devices.png
   - assets/fonts/Cairo-Regular.ttf
   - assets/fonts/Cairo-Bold.ttf


flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"

flutter_native_splash:
  color: "#ffffff"
  image: assets/images/splash_logo.png
  android_12:
    image: assets/images/splash_logo.png
    color: "#ffffff"




